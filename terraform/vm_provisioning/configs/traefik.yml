# vm_provisioning/configs/traefik.yml
api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      email: "your-email@example.com" # <--- Update to your Let's Encrypt email
      storage: "/etc/traefik/acme.json"
      httpChallenge:
        entryPoint: web

providers:
  kubernetesIngress:
    endpoint: "https://192.168.50.X:6443" # <--- Update with your K3s Master IP
    token: "K8S_SERVICE_ACCOUNT_TOKEN_HERE" # <--- Your K3s Service Account Token
    certAuthFilePath: "/etc/traefik/k3s-ca.crt"
