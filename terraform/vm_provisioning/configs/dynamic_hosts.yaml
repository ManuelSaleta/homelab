http:
  routers:
    homepage-router:
      rule: "Host(`homepage.freesalty.com`)"
      service: homepage-service
      entryPoints:
        - web

    pihole-router:
      rule: "Host(`pihole.freesalty.com`)"
      service: pihole-service
      entryPoints:
        - web

  services:
    homepage-service:
      loadBalancer:
        servers:
          - url: "http://192.168.50.241:80" # Points directly to Homepage MetalLB IP

    pihole-service:
      loadBalancer:
        servers:
          - url: "http://192.168.50.242:80" # Points directly to Pi-hole MetalLB IP
