apiVersion: v1
kind: Namespace
metadata:
  name: networking
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole-dns-server
  namespace: networking
  labels:
    app.kubernetes.io/name: pihole
    app.kubernetes.io/component: core-dns
    app.kubernetes.io/part-of: network-services
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pihole-dns-server
  template:
    metadata:
      labels:
        app: pihole-dns-server
    spec:
      containers:
        - name: pihole-ftl-engine
          image: pihole/pihole:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "America/New_York"
            - name: FTLCONF_webserver_api_password
              value: "AdminHomelabPass123"
            - name: FTLCONF_dns_listeningMode
              value: "all"
            - name: FTLCONF_dns_upstreams
              value: "1.1.1.1;8.8.8.8"
            # 🎯 Points all local wildcard queries for your domain back to Traefik Edge Proxy
            - name: FTLCONF_misc_dnsmasq_lines
              value: "address=/freesalty.com/192.168.50.240"
            - name: FTLCONF_webserver_cors_allowedHosts
              value: "pihole.freesalty.com,freesalty.com"
              # FTLCONF environment variables are documented here: https://docs.pi-hole.net/ftldns/configuration/environment-variables/
          ports:
            - containerPort: 53
              name: dns-udp
              protocol: UDP
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 80
              name: admin-http
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: pihole-persistent-config
              mountPath: /etc/pihole
      volumes:
        - name: pihole-persistent-config
          hostPath:
            path: /var/data/pihole/config
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-loadbalancer-service
  namespace: networking
  annotations:
    # 💥 MetalLB hooks up here to give bare-metal LAN access strictly for your DNS query traffic!
    metallb.universe.tf/loadBalancerIPs: "192.168.50.242"
spec:
  type: LoadBalancer
  selector:
    app: pihole-dns-server
  ports:
    - port: 53
      targetPort: 53
      protocol: UDP
      name: inbound-dns-udp
    - port: 53
      targetPort: 53
      protocol: TCP
      name: inbound-dns-tcp
    - port: 80
      targetPort: 80
      protocol: TCP
      name: web # 🎯 Shortened to satisfy the Kubernetes 15-character name limitation
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pihole-ingress
  namespace: networking
spec:
  ingressClassName: traefik
  rules:
    - host: pihole.freesalty.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pihole-loadbalancer-service
                port:
                  name: web # 🎯 Securely maps to the shortened Service port identifier
