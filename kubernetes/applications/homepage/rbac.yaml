apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage-service-account # Corrected spelling here
  namespace: networking
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage-pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services"] # Added 'services' as it's often needed
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  # Added permissions for Traefik IngressRoutes
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage-cluster-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage-pod-reader
subjects:
  - kind: ServiceAccount
    name: homepage-service-account # Must match the ServiceAccount name above
    namespace: networking
