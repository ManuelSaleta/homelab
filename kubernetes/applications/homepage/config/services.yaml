- Management:
    - Proxmox:
        icon: proxmox
        href: https://192.168.50.200:8006
        description: Proxmox Virtual Environment
        widget:
          type: proxmox
          url: https://192.168.50.200:8006
          username: "homepage-widgets-api@pve!homepage-proxmox-widgets"
          password: "{{HOMEPAGE_VAR_PROXMOX_WIDGET_PASSWORD}}"
          node: mothership
          show:
            - vms
- Network:
    - Pi-hole:
        icon: pi-hole
        href: http://pihole.freesalty.com/admin
        description: Cluster DNS & Ad-Shielding
        widget:
          type: pihole
          url: http://192.168.50.242
          version: 6
          key: "{{HOMEPAGE_VAR_PIHOLE_PASSWORD}}"
        # 🎯 FIXED: Aligned 100% to the v1.13.2 manual specification you provided
        namespace: networking
        app: pihole-dns-server
        podSelector: app=pihole-dns-server
    - micro-nas:
        icon: tailscale.png
        href: https://login.tailscale.com/admin/machines
        widget:
          type: tailscale
          deviceid: "{{HOMEPAGE_VAR_TAILSCALE_NAS_DEVICE_ID}}"
          key: "{{HOMEPAGE_VAR_TAILSCALE_API_KEY}}"
          label: "NAS Status"
          fields: [address, last_seen]
    - macbook-pro:
        icon: tailscale.png
        href: https://login.tailscale.com/admin/machines
        widget:
          type: tailscale
          deviceid: "{{HOMEPAGE_VAR_TAILSCALE_LAPTOP_DEVICE_ID}}"
          key: "{{HOMEPAGE_VAR_TAILSCALE_API_KEY}}"
          label: "Laptop Status"
          fields: [address, last_seen]
