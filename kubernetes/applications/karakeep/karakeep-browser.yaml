apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep-browser
  namespace: networking
  labels:
    app: karakeep-browser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: karakeep-browser
  template:
    metadata:
      labels:
        app: karakeep-browser
    spec:
      containers:
        - name: browserless
          image: ghcr.io/browserless/chromium:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: ws
          env:
            - name: MAX_CONCURRENT_SESSIONS
              value: "5"
---
apiVersion: v1
kind: Service
metadata:
  name: karakeep-browser-service
  namespace: networking
spec:
  type: ClusterIP
  selector:
    app: karakeep-browser
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: websocket
