apiVersion: v1
kind: Namespace
metadata:
  name: networking
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole-dns-server
  namespace: networking
  labels:
    app: pihole-dns-server
    app.kubernetes.io/name: pihole
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pihole-dns-server
  template:
    metadata:
      labels:
        app: pihole-dns-server
    spec:
      containers:
        - name: pihole-ftl-engine
          image: pihole/pihole:latest
          env:
            - name: TZ
              value: "America/New_York"
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: pihole-secret
                  key: PIHOLE_PASSWORD
            - name: FTLCONF_dns_listeningMode
              value: "all"
            - name: FTLCONF_dns_upstreams
              value: "1.1.1.1;8.8.8.8"
            - name: FTLCONF_misc_dnsmasq_lines
              value: "address=/freesalty.com/192.168.50.240"
            - name: FTLCONF_webserver_cors_allowedHosts
              value: "pihole.freesalty.com,freesalty.com"
          ports:
            - containerPort: 53
              name: dns-udp
              protocol: UDP
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 80
              name: admin-http
              protocol: TCP
          volumeMounts:
            - name: pihole-persistent-config
              mountPath: /etc/pihole
      volumes:
        - name: pihole-persistent-config
          hostPath:
            path: /var/data/pihole/config
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-loadbalancer-service
  namespace: networking
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.50.242"
spec:
  type: LoadBalancer
  selector:
    app: pihole-dns-server
  ports:
    - port: 53
      targetPort: 53
      protocol: UDP
      name: inbound-dns-udp
    - port: 53
      targetPort: 53
      protocol: TCP
      name: inbound-dns-tcp
    - port: 80
      targetPort: 80
      protocol: TCP
      name: web
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pihole-ingress
  namespace: networking
  annotations:
    # Essential for Homepage Auto-Discovery
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Pi-hole"
    gethomepage.dev/group: "Network"
    gethomepage.dev/icon: "pi-hole"
    # FIX: Upgraded to https so the dashboard icon targets the secure edge
    gethomepage.dev/href: "https://pihole.freesalty.com/admin"
    gethomepage.dev/widget.type: "pihole"
    traefik.ingress.kubernetes.io/router.entrypoints: web, websecure

    # KEEP AS HTTP: This is cluster-internal traffic pod-to-pod, so plain text port 80 is correct and faster
    gethomepage.dev/widget.url: "http://pihole-loadbalancer-service.networking"
    gethomepage.dev/widget.version: "6"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_PIHOLE_PASSWORD}}"
    gethomepage.dev/pod-selector: "app=pihole-dns-server"
spec:
  ingressClassName: traefik
  rules:
    - host: pihole.freesalty.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pihole-loadbalancer-service
                port:
                  number: 80
