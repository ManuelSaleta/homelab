apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: networking
data:
  settings.yaml: |
    title: "Gman's Homelab"
    background: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe"
    cardBlur: sm
    kubernetes:
      cluster: "K3s Cluster"
      nodes: true
  services.yaml: |
    - Core Infrastructure:
        - Pi-hole:
            icon: pi-hole
            href: http://pihole.freesalty.com/admin
            description: Cluster DNS & Ad-Shielding
            widget:
              type: pihole
              url: http://192.168.50.242
              version: 6
              key: "{{HOMEPAGE_VAR_PIHOLE_PASSWORD}}"
            # 🎯 FIXED: Aligned 100% to the v1.13.2 manual specification you provided
            namespace: networking
            app: pihole-dns-server
            podSelector: app=pihole-dns-server
    - Applications:
        - Immich:
            icon: immich
            href: http://immich.freesalty.com
            description: High Performance Photo Backups (Pending Hardware)
    - Management & Observation:
        - Cluster Logging:
            icon: grafana
            href: http://grafana.freesalty.com
            description: Unified Loki Log Explorer (Pending Hardware)
  kubernetes.yaml: |
    mode: cluster
    showCount: true
    cluster:
      show: true
      cpu: true
      memory: true
      nodes: true
      version: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: networking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      dnsPolicy: "ClusterFirst"
      dnsConfig:
        searches:
          - networking.svc.cluster.local
          - svc.cluster.local
          - cluster.local
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          env:
            - name: HOMEPAGE_VAR_PIHOLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pihole-secret
                  key: PIHOLE_PASSWORD
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "192.168.50.*,homepage.freesalty.com,pihole.freesalty.com"
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: config-volume
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
            - name: config-volume
              mountPath: /app/config/services.yaml
              subPath: services.yaml
            - name: config-volume
              mountPath: /app/config/kubernetes.yaml
              subPath: kubernetes.yaml
      volumes:
        - name: config-volume
          configMap:
            name: homepage-config
---
apiVersion: v1
kind: Service
metadata:
  name: homepage-service
  namespace: networking
spec:
  type: ClusterIP
  selector:
    app: homepage
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage-ingress
  namespace: networking
spec:
  ingressClassName: traefik
  rules:
    - host: homepage.freesalty.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homepage-service
                port:
                  number: 80
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage-pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage-cluster-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage-pod-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: networking
