apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    # 1. Environment variables (API Token)
    env:
      - name: CLOUDFLARE_DNS_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-dns-api-token
            key: CF_API_TOKEN

    # 2. Structured Let's Encrypt Setup
    certificatesResolvers:
      le-resolver:
        acme:
          email: your-email@freesalty.com
          storage: /data/acme.json
          dnsChallenge:
            provider: cloudflare
            resolvers:
              - "1.1.1.1:53"
              - "8.8.8.8:53"

    # 3. Clear the explicit domain index arrays to fix the collision
    additionalArguments:
      - "--entryPoints.websecure.http.tls=true"

    # 4. Storage configuration
    persistence:
      enabled: true
      path: /data
      mountPath: /data
      size: 128Mi
