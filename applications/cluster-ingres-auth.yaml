# cluster-ingress-auth.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik-external-ingress
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik-external-ingress-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin # Gives Traefik read access to watch resources cluster-wide
subjects:
  - kind: ServiceAccount
    name: traefik-external-ingress
    namespace: kube-system
