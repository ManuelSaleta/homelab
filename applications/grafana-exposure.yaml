apiVersion: v1
kind: Service
metadata:
  name: grafana-loadbalancer-exposure
  namespace: monitoring
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.50.244"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
