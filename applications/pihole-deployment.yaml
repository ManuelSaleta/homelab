apiVersion: v1
kind: Namespace
metadata:
  name: networking
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole-dns-server
  namespace: networking
  labels:
    app.kubernetes.io/name: pihole
    app.kubernetes.io/component: core-dns
    app.kubernetes.io/part-of: network-services
spec:
  replicas: 1
  strategy:
    type: Recreate # Required: Prevents port 53 locking constraints during container recycling
  selector:
    matchLabels:
      app: pihole-dns-server
  template:
    metadata:
      labels:
        app: pihole-dns-server
    spec:
      containers:
        - name: pihole-ftl-engine
          image: pihole/pihole:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "America/New_York"
            - name: FTLCONF_webserver_api_password
              value: "AdminHomelabPass123"
            - name: FTLCONF_dns_listeningMode
              value: "all" # Directs FTL to accept queries routed from wider LAN subnets
            - name: FTLCONF_dns_upstreams
              value: "1.1.1.1;8.8.8.8"
          ports:
            - containerPort: 53
              name: dns-udp
              protocol: UDP
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 80
              name: admin-http
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: pihole-persistent-config
              mountPath: /etc/pihole
      volumes:
        - name: pihole-persistent-config
          hostPath:
            path: /var/data/pihole/config
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-loadbalancer-service
  namespace: networking
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.50.242" # Gotta figure out how to automate this IP assignment in the future
spec:
  type: LoadBalancer
  selector:
    app: pihole-dns-server
  ports:
    - port: 53
      targetPort: 53
      protocol: UDP
      name: inbound-dns-udp
    - port: 53
      targetPort: 53
      protocol: TCP
      name: inbound-dns-tcp
    - port: 80
      targetPort: 80
      protocol: TCP
      name: inbound-web-http
