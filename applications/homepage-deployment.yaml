apiVersion: v1
kind: Namespace
metadata:
  name: dashboard
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: dashboard
data:
  settings.yaml: |
    title: "Manny's Homelab"
    background: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe"
    cardBlur: sm
  services.yaml: |
    - Core Infrastructure:
        - Pi-hole:
            icon: pi-hole
            href: http://pihole.freesalty.com/admin
            description: Cluster DNS & Ad-Shielding
            widget:
              type: pihole
              url: http://pihole.freesalty.com
              version: 6
              key: "AdminHomelabPass123"
    - Applications:
        - Immich:
            icon: immich
            href: http://immich.freesalty.com
            description: High Performance Photo Backups (Pending Hardware)
    - Management & Observation:
        - Cluster Logging:
            icon: grafana
            href: http://grafana.freesalty.com
            description: Unified Loki Log Explorer (Pending Hardware)
  kubernetes.yaml: |
    mode: cluster
    showCount: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      # 🛠️ NETWORKING FIX: Forces the pod to route DNS queries through your Pi-hole container first
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
          - 192.168.50.242 # Your Pi-hole LoadBalancer IP
          - 1.1.1.1 # Cloudflare fallback if Pi-hole is recycling
        searches:
          - dashboard.svc.cluster.local
          - svc.cluster.local
          - cluster.local
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "192.168.50.241,192.168.50.*,homepage.freesalty.com,pihole.freesalty.com"
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: config-volume
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
            - name: config-volume
              mountPath: /app/config/services.yaml
              subPath: services.yaml
            - name: config-volume
              mountPath: /app/config/kubernetes.yaml
              subPath: kubernetes.yaml
      volumes:
        - name: config-volume
          configMap:
            name: homepage-config
---
apiVersion: v1
kind: Service
metadata:
  name: homepage-loadbalancer
  namespace: dashboard
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.50.241"
spec:
  type: LoadBalancer
  selector:
    app: homepage
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
